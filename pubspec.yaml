version: 0.2.7
repository: https://github.com/codika-io/mason_logger_extension.git
homepage: https://github.com/codika-io/mason_logger_extension
issue_tracker: https://github.com/codika-io/mason_logger_extension/issues
documentation: https://docs.codika.io
topics: [mason, template, generator, codika]

